<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAMBORGHINI HURACÁN — STREET RACING</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Orbitron',monospace}
canvas{display:block}
#intro{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a0010 0%,#000 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.8s}
#intro.fade{opacity:0;pointer-events:none}
.bull{font-size:80px;display:block;animation:floatBull 3s ease-in-out infinite;filter:drop-shadow(0 0 40px #FFD700)}
.brand{font-size:clamp(2.5rem,7vw,5.5rem);font-weight:900;letter-spacing:.35em;background:linear-gradient(135deg,#FFD700 0%,#FF8C00 40%,#FFD700 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:shimmer 2s linear infinite}
.model{font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:.7em;color:#555;margin-top:4px}
.sbtn{margin-top:40px;background:transparent;border:2px solid #FFD700;color:#FFD700;font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;letter-spacing:.4em;padding:1rem 3.5rem;cursor:pointer;transition:.3s;animation:pulseBorder 2s ease-in-out infinite;pointer-events:all;display:block}
.sbtn:hover{background:#FFD700;color:#000;box-shadow:0 0 60px #FFD700}
.hgrid{margin-top:26px;display:flex;flex-direction:column;gap:5px;align-items:center;opacity:.45}
.hrow{display:flex;gap:5px;justify-content:center}
.hk{min-width:36px;height:36px;padding:0 8px;border:1px solid #FFD700;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#FFD700;font-family:'Orbitron',monospace}
.hl{font-family:'Rajdhani',sans-serif;font-size:.62rem;letter-spacing:.25em;color:#444;margin-top:3px;text-align:center}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px;pointer-events:none;z-index:20}
.hbox{background:rgba(0,0,0,.8);border:1px solid rgba(255,215,0,.2);backdrop-filter:blur(12px);padding:10px 16px}
.hlbl{font-size:.46rem;letter-spacing:.4em;color:#444;font-family:'Rajdhani',sans-serif;font-weight:600}
.hval{font-size:1.9rem;font-weight:900;color:#FFD700;line-height:1;text-shadow:0 0 10px #FFD700}
#keys{position:fixed;bottom:18px;left:18px;display:flex;flex-direction:column;gap:4px;pointer-events:none;z-index:20}
.krow{display:flex;gap:4px;justify-content:center}
.kb{min-width:38px;height:38px;padding:0 6px;border:1px solid rgba(255,215,0,.22);background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;font-size:.62rem;color:rgba(255,215,0,.38);font-family:'Orbitron',monospace;font-weight:700;transition:.07s;border-radius:3px}
.kb.on{background:#FFD700;color:#000;box-shadow:0 0 16px #FFD700;border-color:#FFD700}
.kb.drift-on{background:#FF00FF;color:#fff;box-shadow:0 0 20px #FF00FF;border-color:#FF00FF}
.kb.nitro-on{background:linear-gradient(135deg,#00FFFF,#7700FF);color:#fff;box-shadow:0 0 22px #00FFFF;border-color:#00FFFF}
#nwrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:200px;pointer-events:none;z-index:20}
.nlbl{font-size:.46rem;letter-spacing:.5em;color:#FF8C00;font-family:'Rajdhani',sans-serif;text-align:center;margin-bottom:3px}
.ntrack{height:5px;background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.22);border-radius:3px;overflow:hidden}
.nfill{height:100%;background:linear-gradient(90deg,#FF4400,#FFD700);border-radius:3px;transition:.04s}
#dmeter{position:fixed;top:50%;right:16px;transform:translateY(-50%);width:7px;height:100px;background:rgba(255,0,255,.08);border:1px solid rgba(255,0,255,.18);border-radius:4px;overflow:hidden;pointer-events:none;z-index:20}
#dfill{width:100%;height:0%;background:linear-gradient(180deg,#FF00FF,#FF4400);border-radius:4px;position:absolute;bottom:0;transition:.04s}
#gameover{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:80;backdrop-filter:blur(10px)}
#gameover.show{display:flex}
.gotitle{font-size:clamp(3rem,10vw,8rem);font-weight:900;color:#FF0033;letter-spacing:.1em;text-shadow:0 0 60px rgba(255,0,51,.7);animation:shk .4s ease-out}
.goscore{margin-top:8px;font-family:'Rajdhani',sans-serif;font-size:1.3rem;color:#888;letter-spacing:.3em}.goscore span{color:#FFD700;font-weight:700}
.gobtn{margin-top:28px;background:transparent;border:2px solid #FFD700;color:#FFD700;font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;letter-spacing:.4em;padding:.9rem 2.5rem;cursor:pointer;transition:.3s;pointer-events:all;animation:pulseBorder 1.5s ease-in-out infinite}
.gobtn:hover{background:#FFD700;color:#000}
@keyframes floatBull{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes pulseBorder{0%,100%{box-shadow:0 0 6px rgba(255,215,0,.2)}50%{box-shadow:0 0 26px rgba(255,215,0,.7),0 0 52px rgba(255,140,0,.35)}}
@keyframes shk{0%,100%{transform:translate(0)}25%{transform:translate(-12px,-8px) rotate(-2deg)}75%{transform:translate(10px,6px) rotate(1.5deg)}}
@keyframes zin{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div id="intro">
  <div style="text-align:center;animation:zin 1s cubic-bezier(.16,1,.3,1) both">
    <span class="bull">🐂</span>
    <div class="brand">LAMBORGHINI</div>
    <div class="model">Huracán STO · Street Racing</div>
  </div>
  <button class="sbtn" id="startBtn" style="animation:zin 1s .3s cubic-bezier(.16,1,.3,1) both;opacity:0">▶ START ENGINE</button>
  <div class="hgrid" style="animation:zin 1s .55s both;opacity:0">
    <div class="hrow"><div class="hk">W</div></div>
    <div class="hrow"><div class="hk">A</div><div class="hk">S</div><div class="hk">D</div></div>
    <div class="hrow"><div class="hk">⇧ SHIFT</div><div class="hk">SPACE</div></div>
    <div class="hl">W GAZ · S TORMOZ · SHIFT NITRO · SPACE DRIFT</div>
  </div>
</div>

<div id="hud">
  <div class="hbox"><div class="hlbl">SCORE</div><div class="hval" id="hScore">0</div></div>
  <div class="hbox" style="text-align:center"><div class="hlbl">LAMBORGHINI HURACÁN STO</div><div style="color:#FF8C00;font-size:.78rem;letter-spacing:.5em;font-family:Rajdhani,sans-serif;font-weight:700">◆ STREET RACING ◆</div></div>
  <div class="hbox"><div class="hlbl">BEST</div><div class="hval" id="hBest">0</div></div>
</div>

<div id="keys">
  <div class="krow"><div class="kb" id="kW">W</div></div>
  <div class="krow"><div class="kb" id="kA">A</div><div class="kb" id="kS">S</div><div class="kb" id="kD">D</div></div>
  <div class="krow"><div class="kb" id="kSh">⇧ SHIFT</div><div class="kb" id="kSp">SPACE</div></div>
</div>

<div id="nwrap">
  <div class="nlbl" id="nlbl">⇧ NITRO</div>
  <div class="ntrack"><div class="nfill" id="nfill"></div></div>
</div>

<div id="dmeter"><div id="dfill"></div></div>

<div id="gameover">
  <div class="gotitle">CRASH!</div>
  <div class="goscore">SCORE: <span id="goScore">0</span></div>
  <button class="gobtn" id="goBtn">↺ RESTART</button>
</div>

<canvas id="c"></canvas>
<canvas id="sp" width="170" height="170" style="position:fixed;bottom:18px;right:18px;pointer-events:none;z-index:20"></canvas>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const sc=document.getElementById('sp'),sctx=sc.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;calcRoad();}
window.addEventListener('resize',resize);

// INPUT
const K={};
document.addEventListener('keydown',e=>{K[e.key]=true;K[e.key.toLowerCase()]=true;e.preventDefault();});
document.addEventListener('keyup',  e=>{K[e.key]=false;K[e.key.toLowerCase()]=false;});
const ik=(...a)=>a.some(k=>!!K[k]);

// ROAD
let roadX,roadW;
function calcRoad(){roadW=Math.min(560,W*0.55);roadX=(W-roadW)/2;}

// GAME STATE
let active=false,frame=0,score=0,best=0;

// CAR
const CW=44,CH=88;
let car={sx:0,sy:0,speed:0,vx:0,angle:0,heading:0,drift:0,drifting:false,nitro:100,alive:true};

// PHYSICS CONSTANTS
const MAX_SPD   = 9;    // normal max px/frame  → 220 km/h display
const MAX_NIT   = 14;   // nitro max → 320 km/h
const FRICTION  = 0.965; // inertia — W qo'yilganda uzoq ketadi
const BRAKE_F   = 0.82;
const LAT_DAMP  = 0.84;

// ACCELERATION CURVE: sekin boshlanib, o'rta tezlikda tez, oxirida yana qiyin
function getAccel(spd,maxS){
  const r=spd/maxS;
  if(r<0.12) return 0.048;   // 0→10  km/h  — juda sekin start
  if(r<0.30) return 0.040;   // 10→50 km/h
  if(r<0.55) return 0.030;   // 50→120 km/h
  if(r<0.78) return 0.018;   // 120→200 km/h
  return 0.007;               // 200→320 km/h — qiyin
}

// KMH DISPLAY: speed(px/frame) → km/h
function toKmh(s){
  const t=Math.min(1,s/MAX_NIT);
  return Math.round(t*t*(3-2*t)*320);
}

// WORLD
let scroll=0;
let lines=[],bldgs=[],obs=[],parts=[],exh=[],skids=[];

function mkB(y){
  const side=Math.random()<.5?'L':'R';
  const bw=55+Math.random()*115,bh=65+Math.random()*210;
  const bx=side==='L'?roadX-14-bw-Math.random()*75:roadX+roadW+14+Math.random()*75;
  return{x:bx,y,w:bw,h:bh,side,
    clr:`hsl(${208+Math.random()*45},${11+Math.random()*13}%,${5+Math.random()*9}%)`,
    wc:`rgba(${Math.random()<.4?255:50},${Math.random()*70},0,${.1+Math.random()*.18})`,
    neon:Math.random()<.33,nc:`hsl(${Math.random()*360},100%,55%)`};
}

function initGame(){
  calcRoad();frame=0;score=0;
  car.sx=W/2;car.sy=H*.72;
  car.speed=0;car.vx=0;car.angle=0;car.heading=0;
  car.drift=0;car.drifting=false;car.nitro=100;car.alive=true;
  obs=[];parts=[];exh=[];skids=[];scroll=0;lines=[];bldgs=[];
  for(let i=0;i<18;i++) lines.push({y:i*(H/8)});
  for(let i=0;i<35;i++) bldgs.push(mkB(Math.random()*H*4-H));
  document.getElementById('gameover').classList.remove('show');
  active=true;
}

function spawnOb(){
  const lw=roadW/4,lane=Math.floor(Math.random()*4);
  const cx=roadX+lane*lw+lw/2;
  const t=Math.random()<.18?'truck':'car';
  const cc=['#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#ecf0f1','#1abc9c'];
  obs.push({x:cx,y:-130,w:t==='truck'?50:38,h:t==='truck'?108:78,type:t,clr:cc[Math.floor(Math.random()*cc.length)],spd:.4+Math.random()*.85});
}

// UPDATE
function update(){
  if(!active||!car.alive) return;
  frame++;

  const gas  =ik('w','W','ArrowUp');
  const brake=ik('s','S','ArrowDown');
  const left =ik('a','A','ArrowLeft');
  const right=ik('d','D','ArrowRight');
  const nitro=ik('Shift','shift');
  const drift=ik(' ');

  score+=car.speed*0.055;

  // === FORWARD PHYSICS ===
  const maxS=(nitro&&car.nitro>5)?MAX_NIT:MAX_SPD;
  if(gas){
    const a=getAccel(car.speed,maxS);
    car.speed=Math.min(maxS,car.speed+a);
    if(nitro&&car.nitro>5) car.nitro=Math.max(0,car.nitro-0.55);
    else car.nitro=Math.min(100,car.nitro+0.1);
  } else if(brake){
    // Tormoz — tezlik va yon harakat ikkalasi ham kamayadigan real tormoz
    car.speed *= BRAKE_F;
    car.vx    *= BRAKE_F;  // yon inertia ham tormozlanadi
    if(car.speed < 0.05) car.speed = 0;
    car.nitro = Math.min(100, car.nitro + 0.28);
  } else {
    // W qo'yildi — inertia! uzoq ketadi, sekin-sekin to'xtaydi
    car.speed*=FRICTION;
    if(car.speed<0.03) car.speed=0;
    car.nitro=Math.min(100,car.nitro+0.16);
  }

  // === DRIFT ===
  // Speed ratio 0..1
  const sf = Math.min(1, car.speed / MAX_SPD);

  if(drift && car.speed > 1.2){
    car.drifting = true;
    car.drift = Math.min(1, car.drift + 0.055);
  } else {
    car.drifting = false;
    car.drift = Math.max(0, car.drift - 0.04);
  }

  // === STEERING ===
  // Tezlik qancha ko'p bo'lsa, burilish shuncha ta'sirchan (real mashina)
  // Lekin juda past tezlikda (to'xtab qolganda) burilish ishlamaydi
  const steerPower = sf * sf * 0.55 + sf * 0.2; // kvadratik — tez ketganda keskin
  const driftMult = car.drifting ? 2.2 : 1.0;

  if(left && car.speed > 0.2){
    car.vx -= steerPower * driftMult;
    // Visual angle — tez ketganda ko'proq egiladi
    car.angle = Math.max(car.angle - (2 + sf * 4), -22);
    car.heading = Math.max(car.heading - (1.2 + sf * 1.8) * driftMult, -24);
  } else if(right && car.speed > 0.2){
    car.vx += steerPower * driftMult;
    car.angle = Math.min(car.angle + (2 + sf * 4),  22);
    car.heading = Math.min(car.heading + (1.2 + sf * 1.8) * driftMult,  24);
  } else {
    // Ruletor markaz qaytadi — tez qaytsin
    car.heading *= car.drifting ? 0.97 : 0.78;
    car.angle   *= car.drifting ? 0.97 : 0.76;
  }

  // Yon inertia — tezlikka qarab seziladi
  // Tez ketganda yon harakat kamroq seziladi (understeering effect)
  const latFriction = car.drifting ? 0.91 : (0.72 + sf * 0.18);
  car.vx *= latFriction;

  // Max yon tezlik — tezlikga proporsional
  const maxLat = 4 + sf * 7;
  car.vx = Math.max(-maxLat, Math.min(maxLat, car.vx));

  // === POSITION ===
  car.sx+=car.vx;
  if(car.drifting) car.sy+=car.vx*0.1;
  car.sy=Math.max(H*.5,Math.min(H*.86,car.sy));
  const mg=CW/2+6;
  if(car.sx<roadX+mg){car.sx=roadX+mg;car.vx=Math.max(0,car.vx);}
  if(car.sx>roadX+roadW-mg){car.sx=roadX+roadW-mg;car.vx=Math.min(0,car.vx);}

  // === WORLD SCROLL ===
  const sc2=car.speed;
  scroll+=sc2;
  lines.forEach(m=>{m.y+=sc2;if(m.y>H+40)m.y=-40;});
  bldgs.forEach(b=>{
    b.y+=sc2*0.27;
    if(b.y>H+b.h+60){b.y=-(b.h+60);Object.assign(b,mkB(b.y));
      b.x=b.side==='L'?roadX-14-b.w-Math.random()*75:roadX+roadW+14+Math.random()*75;}
  });

  // Skid marks
  if(car.drifting&&car.speed>1&&frame%2===0)
    skids.push({x:car.sx,y:car.sy+CH*.34,len:20,life:1});
  skids.forEach(sk=>{sk.y+=sc2;sk.life-=.008;});
  skids=skids.filter(s=>s.life>0&&s.y<H+70);

  // Obstacles
  const rate=Math.max(26,80-Math.floor(score/160));
  if(car.speed>0.4&&frame%rate===0) spawnOb();
  obs.forEach(ob=>{
    ob.y+=sc2*(0.22+ob.spd);
    if(car.alive&&Math.abs(ob.x-car.sx)<(ob.w+CW)/2-4&&Math.abs(ob.y-car.sy)<(ob.h+CH)/2-5) doCrash();
  });
  obs=obs.filter(o=>o.y<H+160);

  // Exhaust
  if(frame%2===0) spawnExh(nitro&&car.nitro>5,car.drifting);
  exh.forEach(e=>{e.x+=e.vx;e.y+=e.vy;e.life-=.062;e.sz*=1.05;});
  exh=exh.filter(e=>e.life>0);

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life-=.019;p.sz*=.97;});
  parts=parts.filter(p=>p.life>0);

  // KEY UI
  // Key UI — faqat bosilgan tugma yonsin
  setK('kW', gas);
  setK('kS', brake);
  setK('kA', left && !car.drifting);
  setK('kD', right && !car.drifting);
  if(left  && car.drifting) document.getElementById('kA').className='kb drift-on';
  if(right && car.drifting) document.getElementById('kD').className='kb drift-on';
  if(!left  && !car.drifting) setK('kA', false);
  if(!right && !car.drifting) setK('kD', false);
  setKSp('kSp', car.drifting);
  const ksh=document.getElementById('kSh');
  ksh.className='kb'+(nitro&&car.nitro>5?' nitro-on':'');
  document.getElementById('nfill').style.width=car.nitro+'%';
  document.getElementById('nfill').style.background=nitro?'linear-gradient(90deg,#00FFFF,#AA00FF)':'linear-gradient(90deg,#FF4400,#FFD700)';
  document.getElementById('nlbl').textContent=nitro?'◆ NITRO ACTIVE ◆':'⇧ NITRO';
  document.getElementById('dfill').style.height=(car.drift*100)+'%';
  document.getElementById('hScore').textContent=Math.floor(score);
}

function setK(id,on){const e=document.getElementById(id);e.className='kb'+(on?' on':'');}
function setKDrift(id,on){const e=document.getElementById(id);if(on)e.className='kb drift-on';}
function setKSp(id,on){const e=document.getElementById(id);e.className='kb'+(on?' drift-on':'');}

function spawnExh(isNit,isDrift){
  for(let i=-1;i<=1;i+=2){
    exh.push({x:car.sx+i*10,y:car.sy+CH/2+4,
      vx:(Math.random()-.5)*2+i*(isDrift?2.2:0),
      vy:car.speed*.22+Math.random()*1.4,
      life:1,sz:isNit?15:isDrift?9:5,isNit,isDrift});
  }
}

function boom(x,y,c,n=22){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*10;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,clr:c,sz:3+Math.random()*6});}
}

function doCrash(){
  if(!car.alive) return;
  car.alive=false;active=false;
  boom(car.sx,car.sy,'#FF0033',28);boom(car.sx,car.sy,'#FFD700',18);boom(car.sx,car.sy,'#FF6B00',14);
  if(score>best){best=Math.floor(score);document.getElementById('hBest').textContent=best;}
  document.getElementById('goScore').textContent=Math.floor(score);
  setTimeout(()=>document.getElementById('gameover').classList.add('show'),800);
}

// DRAW ROAD
function drawRoad(){
  ctx.fillStyle='#020308';ctx.fillRect(0,0,W,H);
  bldgs.forEach(b=>{
    ctx.fillStyle=b.clr;ctx.fillRect(b.x,b.y-b.h,b.w,b.h);
    ctx.fillStyle=b.wc;
    for(let wy=b.y-b.h+8;wy<b.y-6;wy+=16)
      for(let wx=b.x+5;wx<b.x+b.w-5;wx+=13)
        if((wx^wy)%3!==0) ctx.fillRect(wx,wy,7,9);
    if(b.neon){ctx.strokeStyle=b.nc+'55';ctx.lineWidth=1.5;ctx.shadowColor=b.nc;ctx.shadowBlur=9;ctx.strokeRect(b.x,b.y-b.h,b.w,b.h);ctx.shadowBlur=0;}
  });
  const rg=ctx.createLinearGradient(roadX,0,roadX+roadW,0);
  rg.addColorStop(0,'#0e0e1e');rg.addColorStop(.5,'#181832');rg.addColorStop(1,'#0e0e1e');
  ctx.fillStyle=rg;ctx.fillRect(roadX,0,roadW,H);
  // edge glows
  [[roadX,1],[roadX+roadW,-1]].forEach(([ex,dir])=>{
    const eg=ctx.createLinearGradient(ex,0,ex+dir*50,0);
    eg.addColorStop(0,'rgba(255,100,0,0.13)');eg.addColorStop(1,'transparent');
    ctx.fillStyle=eg;ctx.fillRect(ex-25,0,50,H);
  });
  ctx.shadowColor='#FF6B00';ctx.shadowBlur=16;ctx.strokeStyle='#FF6B00';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(roadX,0);ctx.lineTo(roadX,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(roadX+roadW,0);ctx.lineTo(roadX+roadW,H);ctx.stroke();
  ctx.shadowBlur=0;
  ctx.setLineDash([30,22]);ctx.strokeStyle='rgba(255,220,0,0.13)';ctx.lineWidth=1.5;
  for(let l=1;l<4;l++){const lx=roadX+(roadW/4)*l;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();}
  ctx.setLineDash([]);
  lines.forEach(m=>{ctx.fillStyle='rgba(255,215,0,0.42)';ctx.shadowColor='#FFD700';ctx.shadowBlur=5;ctx.fillRect(roadX+roadW/2-2.5,m.y,5,26);ctx.shadowBlur=0;});
  skids.forEach(sk=>{
    ctx.globalAlpha=sk.life*0.42;ctx.strokeStyle='#1e1e1e';ctx.lineWidth=5;ctx.setLineDash([9,6]);
    ctx.beginPath();ctx.moveTo(sk.x-7,sk.y);ctx.lineTo(sk.x-7,sk.y+sk.len);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sk.x+7,sk.y);ctx.lineTo(sk.x+7,sk.y+sk.len);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  });
}

// DRAW LAMBO
function drawLambo(cx,cy,bc,w,h,ang,isP){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang*Math.PI/180);
  const hw=w/2,hh=h/2;
  ctx.save();ctx.translate(3,5);ctx.fillStyle='rgba(0,0,0,0.42)';
  ctx.beginPath();ctx.ellipse(0,4,hw+3,hh+2,0,0,Math.PI*2);ctx.fill();ctx.restore();
  const bg=ctx.createLinearGradient(-hw,0,hw,0);
  bg.addColorStop(0,sh(bc,-65));bg.addColorStop(.12,sh(bc,-30));bg.addColorStop(.32,bc);
  bg.addColorStop(.5,sh(bc,55));bg.addColorStop(.68,bc);bg.addColorStop(.88,sh(bc,-30));bg.addColorStop(1,sh(bc,-65));
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(-hw+6,hh);ctx.lineTo(hw-6,hh);
  ctx.bezierCurveTo(hw+2,hh,hw+7,hh-12,hw+6,hh-26);
  ctx.lineTo(hw+8,hh-36);ctx.lineTo(hw+6,10);ctx.lineTo(hw+4,-8);
  ctx.lineTo(hw+8,-hh+38);ctx.lineTo(hw+4,-hh+20);
  ctx.bezierCurveTo(hw+2,-hh+14,hw-3,-hh+7,hw-12,-hh+3);
  ctx.lineTo(-hw+12,-hh+3);
  ctx.bezierCurveTo(-hw+3,-hh+7,-hw-2,-hh+14,-hw-4,-hh+20);
  ctx.lineTo(-hw-8,-hh+38);ctx.lineTo(-hw-4,-8);ctx.lineTo(-hw-6,10);
  ctx.lineTo(-hw-8,hh-36);ctx.lineTo(-hw-6,hh-26);
  ctx.bezierCurveTo(-hw-7,hh-12,-hw-2,hh,-hw+6,hh);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=sh(bc,-75);ctx.lineWidth=1.2;ctx.stroke();
  ctx.fillStyle='rgba(18,55,115,0.88)';
  ctx.beginPath();ctx.moveTo(-hw+16,-hh+7);ctx.lineTo(hw-16,-hh+7);ctx.lineTo(hw-10,-hh+30);ctx.lineTo(-hw+10,-hh+30);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.09)';
  ctx.beginPath();ctx.moveTo(-hw+18,-hh+9);ctx.lineTo(-2,-hh+9);ctx.lineTo(-7,-hh+28);ctx.lineTo(-hw+12,-hh+28);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(6,26,65,0.84)';
  ctx.beginPath();ctx.moveTo(-hw+14,hh-7);ctx.lineTo(hw-14,hh-7);ctx.lineTo(hw-18,hh-26);ctx.lineTo(-hw+18,hh-26);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.27)';
  ctx.beginPath();ctx.moveTo(-5,-hh+34);ctx.lineTo(5,-hh+34);ctx.lineTo(3,-hh+13);ctx.lineTo(-3,-hh+13);ctx.closePath();ctx.fill();
  ctx.strokeStyle=sh(bc,-45);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-hw+22,-hh+6);ctx.lineTo(-18,-hh+34);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hw-22,-hh+6);ctx.lineTo(18,-hh+34);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.fillRect(-hw-5,-12,9,24);ctx.fillRect(-hw-5,-1,12,3);ctx.fillRect(-hw-5,7,12,3);
  ctx.fillRect(hw-4,-12,9,24);ctx.fillRect(hw-8,-1,12,3);ctx.fillRect(hw-8,7,12,3);
  if(isP){ctx.shadowColor='#FFFDE0';ctx.shadowBlur=26;}
  ctx.fillStyle='#FFFCE0';
  ctx.beginPath();ctx.moveTo(-hw+7,-hh+1);ctx.lineTo(-hw+20,-hh+1);ctx.lineTo(-hw+18,-hh+9);ctx.lineTo(-hw+5,-hh+9);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(hw-7,-hh+1);ctx.lineTo(hw-20,-hh+1);ctx.lineTo(hw-18,-hh+9);ctx.lineTo(hw-5,-hh+9);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,252,200,0.68)';ctx.fillRect(-hw+20,-hh+1,w-40,2);
  ctx.shadowBlur=0;
  ctx.fillStyle='#FF0033';ctx.shadowColor='#FF0033';ctx.shadowBlur=isP?13:4;
  ctx.fillRect(-hw+4,hh-7,16,5);ctx.fillRect(hw-20,hh-7,16,5);
  ctx.fillStyle='rgba(255,0,51,0.38)';ctx.fillRect(-hw+20,hh-6,w-40,3);
  ctx.shadowBlur=0;
  ctx.fillStyle=sh(bc,14);ctx.beginPath();ctx.roundRect(-hw+12,-hh+32,w-24,hh-24,3);ctx.fill();
  ctx.strokeStyle=sh(bc,-14);ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(0,-hh+32);ctx.lineTo(0,hh-26);ctx.stroke();
  [{x:-hw-3,y:-hh+16},{x:hw-7,y:-hh+16},{x:-hw-3,y:hh-36},{x:hw-7,y:hh-36}].forEach(wh=>{
    ctx.fillStyle='#0d0d0d';ctx.beginPath();ctx.roundRect(wh.x-1,wh.y,10,19,2);ctx.fill();
    const rcx=wh.x+4,rcy=wh.y+9.5;
    ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(rcx,rcy,3.5,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#666';ctx.lineWidth=1;
    for(let s=0;s<5;s++){const a=(s/5)*Math.PI*2+frame*.18;ctx.beginPath();ctx.moveTo(rcx,rcy);ctx.lineTo(rcx+Math.cos(a)*3.2,rcy+Math.sin(a)*3.2);ctx.stroke();}
  });
  ctx.font='8px serif';ctx.textAlign='center';ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=5;
  ctx.fillText('🐂',0,-hh+42);ctx.shadowBlur=0;
  ctx.restore();
}

function sh(hex,p){
  let r=parseInt(hex.slice(1,3),16)||200,g=parseInt(hex.slice(3,5),16)||170,b=parseInt(hex.slice(5,7),16)||0;
  return`rgb(${Math.max(0,Math.min(255,r+p))},${Math.max(0,Math.min(255,g+p))},${Math.max(0,Math.min(255,b+p))})`;
}

// DRAW EXHAUST
function drawExh(){
  exh.forEach(e=>{
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.sz);
    if(e.isNit){g.addColorStop(0,`rgba(180,255,255,${e.life})`);g.addColorStop(.3,`rgba(0,180,255,${e.life*.7})`);g.addColorStop(.7,`rgba(120,0,200,${e.life*.3})`);g.addColorStop(1,'rgba(0,0,0,0)');}
    else if(e.isDrift){g.addColorStop(0,`rgba(255,80,200,${e.life*.8})`);g.addColorStop(.5,`rgba(180,0,100,${e.life*.3})`);g.addColorStop(1,'rgba(0,0,0,0)');}
    else{g.addColorStop(0,`rgba(195,105,0,${e.life*.7})`);g.addColorStop(.5,`rgba(130,55,0,${e.life*.22})`);g.addColorStop(1,'rgba(0,0,0,0)');}
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.sz,0,Math.PI*2);ctx.fill();
  });
}

// DRAW PARTICLES
function drawParts(){
  parts.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.clr;ctx.shadowColor=p.clr;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();ctx.restore();});
  ctx.shadowBlur=0;ctx.globalAlpha=1;
}

// SPEEDOMETER
function drawSpeedo(){
  const kmh=toKmh(car.speed),maxK=320,ratio=kmh/maxK;
  sctx.clearRect(0,0,170,170);
  const cx=85,cy=85,r=76;
  sctx.beginPath();sctx.arc(cx,cy,r,0,Math.PI*2);sctx.fillStyle='rgba(0,0,0,0.92)';sctx.fill();
  sctx.strokeStyle='rgba(255,215,0,0.07)';sctx.lineWidth=2;sctx.stroke();
  const sa=Math.PI*.75,sp=Math.PI*1.5;
  sctx.beginPath();sctx.arc(cx,cy,r-9,sa,sa+sp);sctx.strokeStyle='rgba(255,215,0,0.06)';sctx.lineWidth=14;sctx.stroke();
  const col=kmh>250?'#FF0033':kmh>150?'#FF6B00':kmh>60?'#FFD700':'#44FF88';
  if(ratio>0.001){
    sctx.beginPath();sctx.arc(cx,cy,r-9,sa,sa+sp*ratio);
    sctx.strokeStyle=col;sctx.lineWidth=14;sctx.shadowColor=col;sctx.shadowBlur=16;sctx.stroke();sctx.shadowBlur=0;
  }
  // Ticks at key km/h values
  [0,10,30,60,100,150,200,250,320].forEach(tk=>{
    const a=sa+sp*(tk/maxK);
    sctx.beginPath();sctx.moveTo(cx+Math.cos(a)*(r-17),cy+Math.sin(a)*(r-17));
    sctx.lineTo(cx+Math.cos(a)*(r-26),cy+Math.sin(a)*(r-26));
    sctx.strokeStyle=tk/maxK<=ratio?col:'rgba(255,215,0,0.2)';sctx.lineWidth=2;sctx.stroke();
    if([0,10,30,100,320].includes(tk)){
      sctx.fillStyle='rgba(255,215,0,0.38)';sctx.font='5.5px Orbitron';sctx.textAlign='center';
      sctx.fillText(tk,cx+Math.cos(a)*(r-34),cy+Math.sin(a)*(r-34)+2);
    }
  });
  // Needle
  const na=sa+sp*ratio;
  sctx.save();sctx.translate(cx,cy);sctx.rotate(na);
  sctx.beginPath();sctx.moveTo(0,9);sctx.lineTo(0,-(r-22));
  sctx.strokeStyle='#FF2244';sctx.lineWidth=2.5;sctx.shadowColor='#FF2244';sctx.shadowBlur=10;sctx.stroke();sctx.shadowBlur=0;
  sctx.restore();
  sctx.beginPath();sctx.arc(cx,cy,9,0,Math.PI*2);sctx.fillStyle='#1a1a1a';sctx.fill();
  sctx.beginPath();sctx.arc(cx,cy,4.5,0,Math.PI*2);sctx.fillStyle='#FF2244';sctx.fill();
  sctx.fillStyle=col;sctx.font='bold 22px Orbitron';sctx.textAlign='center';sctx.textBaseline='middle';
  sctx.shadowColor=col;sctx.shadowBlur=11;sctx.fillText(kmh,cx,cy-6);sctx.shadowBlur=0;
  sctx.fillStyle='#444';sctx.font='6.5px Rajdhani';sctx.fillText('KM/H',cx,cy+11);
  sctx.fillStyle='#FFD700';sctx.font='11px serif';sctx.fillText('🐂',cx,cy+24);
}

// RENDER
function render(){
  ctx.clearRect(0,0,W,H);
  drawRoad();
  drawExh();
  obs.forEach(ob=>drawLambo(ob.x,ob.y,ob.clr,ob.w,ob.h,0,false));
  const kmh=toKmh(car.speed);
  if(kmh>50){
    const intense=Math.min(1,(kmh-50)/270);
    ctx.globalAlpha=intense*0.16;
    const lc=ik('Shift','shift')&&car.nitro>5?'rgba(0,255,255,1)':car.drifting?'rgba(255,80,200,1)':'rgba(255,255,255,1)';
    for(let i=0;i<24;i++){
      ctx.strokeStyle=lc;ctx.lineWidth=.4;
      const lx=roadX+Math.random()*roadW,ly=Math.random()*H;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+(Math.random()-.5)*3,ly+45+kmh*.14);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  if(car.alive){
    const isNit=ik('Shift','shift')&&car.nitro>5;
    ctx.shadowColor=car.drifting?'#FF00FF':isNit?'#00FFFF':'#FFD700';
    ctx.shadowBlur=16+car.speed*2+(isNit?18:0)+(car.drifting?14:0);
    drawLambo(car.sx,car.sy,'#FFD700',CW,CH,car.angle+car.heading*.28,true);
    ctx.shadowBlur=0;
  }
  drawParts();
  if(ik('Shift','shift')&&car.nitro>5&&car.speed>1){ctx.fillStyle='rgba(0,160,255,0.028)';ctx.fillRect(0,0,W,H);}
  if(car.drifting&&car.speed>0.5){ctx.fillStyle='rgba(255,0,180,0.022)';ctx.fillRect(0,0,W,H);}
  drawSpeedo();
}

// LOOP
function loop(){update();render();requestAnimationFrame(loop);}

// INIT
resize();
document.getElementById('startBtn').onclick=()=>{
  document.getElementById('intro').classList.add('fade');
  setTimeout(()=>document.getElementById('intro').style.display='none',800);
  initGame();loop();
};
document.getElementById('goBtn').onclick=()=>initGame();
</script>
